<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro Educativo — Template</title>
<!-- KaTeX — math rendering (loaded synchronously so render() can call renderMathInElement) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
/* ══════════════════════════════════════════════════════════════════════
   DESIGN TOKENS  — no external fonts, fully VSCode-safe
══════════════════════════════════════════════════════════════════════ */
:root {
  /* System font stack */
  --f-display : Georgia, 'Times New Roman', serif;
  --f-body    : -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --f-mono    : 'SF Mono', Consolas, 'Courier New', monospace;

  /* Default palette (Sunset Orange / Profesiones) */
  --p-primary   : #C8521A;
  --p-secondary : #E8975A;
  --p-light     : #FDF0E6;
  --p-accent    : #2A7A6B;
  --p-accent2   : #F5C842;
  --p-page-bg   : #FFFDF9;
  --p-text-dark : #1E1208;
  --p-text-mid  : #4A3525;
  --p-text-light: #8C6A4E;

  /* Geometry — A4 proportions (210 × 297 mm at 96 dpi = 794 × 1123 px) */
  --page-w    : 794px;
  --page-h    : 1123px;
  --page-pad  : 52px 64px 88px;
  --b-thick   : 6px;
  --b-thin    : 1.5px;
  --radius    : 4px;
}

/* ── Palette overrides ─────────────────────────────────────────────── */
.pal-azul         { --p-primary:#1A4EA0; --p-secondary:#5B8CE8; --p-light:#EAF0FD; --p-accent:#E8A720; --p-accent2:#F5C842; --p-page-bg:#F7FAFF; --p-text-dark:#0E1E40; --p-text-mid:#1A3060; --p-text-light:#5070A0; }
.pal-rojo         { --p-primary:#B01E2A; --p-secondary:#E0555E; --p-light:#FDF0F0; --p-accent:#1A5CA0; --p-accent2:#F5C842; --p-page-bg:#FFF8F8; --p-text-dark:#3A0A0E; --p-text-mid:#6A2028; --p-text-light:#A05058; }
.pal-naranja      { --p-primary:#C8521A; --p-secondary:#E8975A; --p-light:#FDF0E6; --p-accent:#2A7A6B; --p-accent2:#F5C842; --p-page-bg:#FFFDF9; --p-text-dark:#1E1208; --p-text-mid:#4A3525; --p-text-light:#8C6A4E; }
.pal-rosa         { --p-primary:#B8286A; --p-secondary:#E074A8; --p-light:#FDF0F7; --p-accent:#5A28B8; --p-accent2:#FFCC44; --p-page-bg:#FFF8FC; --p-text-dark:#2A0818; --p-text-mid:#601840; --p-text-light:#A06080; }
.pal-negro        { --p-primary:#1A1A2E; --p-secondary:#3A3A5C; --p-light:#EDEDF5; --p-accent:#E8C520; --p-accent2:#E8C520; --p-page-bg:#F5F5FA; --p-text-dark:#0A0A18; --p-text-mid:#2A2A44; --p-text-light:#6060A0; }
.pal-olivo        { --p-primary:#4A5E20; --p-secondary:#8AAA40; --p-light:#F0F4E0; --p-accent:#8B4500; --p-accent2:#D4B820; --p-page-bg:#F8FAF0; --p-text-dark:#1A2008; --p-text-mid:#384018; --p-text-light:#6A7840; }
.pal-arcoiris     { --p-primary:#6030C8; --p-secondary:#E84060; --p-light:#F8F0FF; --p-accent:#20A870; --p-accent2:#F8C820; --p-page-bg:#FFFAFF; --p-text-dark:#180828; --p-text-mid:#401860; --p-text-light:#8050B0; }
.pal-halloween    { --p-primary:#D05800; --p-secondary:#FF8C00; --p-light:#2A1500; --p-accent:#6A20A8; --p-accent2:#F8C820; --p-page-bg:#0E0804; --p-text-dark:#FFD080; --p-text-mid:#FFA040; --p-text-light:#C07030; }
.pal-navidad      { --p-primary:#1E6E2E; --p-secondary:#C83020; --p-light:#E8F8E8; --p-accent:#C83020; --p-accent2:#F8CC20; --p-page-bg:#F5FFF5; --p-text-dark:#0A2010; --p-text-mid:#1A4020; --p-text-light:#408050; }
.pal-san-valentin { --p-primary:#C01848; --p-secondary:#F06090; --p-light:#FFF0F5; --p-accent:#9020A8; --p-accent2:#FFB8CC; --p-page-bg:#FFF8FA; --p-text-dark:#280818; --p-text-mid:#601838; --p-text-light:#A06080; }

/* ══════════════════════════════════════════════════════════════════════
   BASE
══════════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; background: #D8D0C8; }
body {
  font-family: var(--f-body);
  color: var(--p-text-dark);
  background: #D8D0C8;
  padding: 44px 20px 80px;
}

/* RTL support */
html[dir="rtl"] body { direction: rtl; }
html[dir="rtl"] .blk-concept,
html[dir="rtl"] .blk-example {
  border-left: none;
  border-right: 4px solid var(--p-primary);
  border-radius: 8px 0 0 8px;
}
html[dir="rtl"] .blk-example {
  border-right-color: var(--p-accent);
}
html[dir="rtl"] .ch-h2 {
  border-left: none;
  border-right: 5px solid var(--p-primary);
  padding-left: 0;
  padding-right: 16px;
}
html[dir="rtl"] .cover-desc {
  border-left: none;
  border-right: 3px solid rgba(255,255,255,.32);
  padding-left: 0;
  padding-right: 16px;
}

/* ══════════════════════════════════════════════════════════════════════
   BOOK COVER
══════════════════════════════════════════════════════════════════════ */
.book-cover {
  width: var(--page-w);
  max-width: 100%;
  height: var(--page-h);
  overflow: hidden;
  margin: 0 auto 32px;
  background: var(--p-primary);
  border-radius: 2px 14px 14px 2px;
  padding: 60px 60px 52px;
  position: relative;
  box-shadow:
    -8px 0 0 rgba(0,0,0,.28),
    -2px 6px 32px rgba(0,0,0,.38),
    10px 10px 36px rgba(0,0,0,.18);
  overflow: hidden;
}
.book-cover::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 22px;
  background: linear-gradient(to right, rgba(0,0,0,.36), rgba(0,0,0,.08) 60%, transparent);
}
.book-cover::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 72% 22%, rgba(255,220,150,.14) 0%, transparent 52%),
    radial-gradient(ellipse at 18% 82%, rgba(0,0,0,.12) 0%, transparent 38%);
  pointer-events: none;
}
.cover-badge {
  position: absolute; top: 26px; right: 30px;
  background: var(--p-accent2);
  color: var(--p-text-dark);
  font-family: var(--f-body); font-weight: 800; font-size: .66rem;
  letter-spacing: .13em; text-transform: uppercase;
  padding: 5px 14px; border-radius: 20px; z-index: 2;
}
.cover-topic {
  font-family: var(--f-body); font-weight: 700; font-size: .66rem;
  letter-spacing: .22em; text-transform: uppercase;
  color: rgba(255,255,255,.6); margin-bottom: 14px;
  position: relative; z-index: 2;
}
.cover-title {
  font-family: var(--f-display); font-weight: 700;
  font-size: clamp(1.9rem, 4vw, 2.85rem); line-height: 1.12;
  color: #fff; margin-bottom: 22px;
  position: relative; z-index: 2;
}
.cover-desc {
  font-size: .9rem; line-height: 1.72; color: rgba(255,255,255,.8);
  border-left: 3px solid rgba(255,255,255,.32);
  padding-left: 16px; max-width: 520px;
  position: relative; z-index: 2;
}
.cover-meta {
  display: flex; gap: 22px; align-items: center;
  margin-top: 32px; position: relative; z-index: 2;
  flex-wrap: wrap;
}
.cover-meta-item {
  font-family: var(--f-body); font-size: .74rem;
  color: rgba(255,255,255,.58);
  display: flex; flex-direction: column; gap: 2px;
}
.cover-meta-item strong { color: #fff; font-size: .86rem; }
.cover-sep { width: 1px; height: 30px; background: rgba(255,255,255,.2); }

.cover-deco {
  position: absolute; right: -24px; bottom: -24px;
  width: 240px; height: 240px; opacity: .08; z-index: 1;
  pointer-events: none;
}

/* ══════════════════════════════════════════════════════════════════════
   SHARED PAGE SHELL
══════════════════════════════════════════════════════════════════════ */
.book-page {
  width: var(--page-w);
  max-width: 100%;
  height: var(--page-h);
  overflow: hidden;
  margin: 0 auto 30px;
  background: var(--p-page-bg);
  box-shadow:
    0 4px 28px rgba(0,0,0,.13),
    0 1px 3px rgba(0,0,0,.07);
  border-radius: 2px;
  page-break-after: always;
  break-after: page;
}
.page-frame {
  margin: 14px;
  border: var(--b-thick) solid var(--p-primary);
  border-radius: var(--radius);
  padding: var(--page-pad);
  position: relative;
  height: calc(var(--page-h) - 28px);
  background: var(--p-page-bg);
  overflow: hidden;
}

/* Offscreen block measurement container */
.ch-measure {
  position: fixed;
  left: -10000px;
  top: 0;
  width: 626px; /* 794 - 2*14(frame margin) - 2*6(border) - 2*64(padding) */
  visibility: hidden;
  pointer-events: none;
}
/* padding: 1px prevents child margins from collapsing out of the wrapper,
   giving getBoundingClientRect() the full height including block margins. */
.ch-measure-blk { padding: 1px 0; }

/* Continuation-page chapter label */
.ch-cont-label {
  font-family: var(--f-body);
  font-weight: 700;
  font-size: .6rem;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--p-text-light);
  margin-bottom: 20px;
  padding-bottom: 8px;
  border-bottom: 1.5px dashed var(--p-secondary);
  position: relative;
  z-index: 1;
}
/* Notebook ruled lines removed — clean page background only */
.inner-border {
  position: absolute; inset: 9px;
  border: var(--b-thin) solid var(--p-secondary);
  border-radius: calc(var(--radius) - 2px);
  pointer-events: none; opacity: .7;
}
.c-tl, .c-tr, .c-bl, .c-br {
  position: absolute;
  font-size: .95rem; line-height: 1;
  color: var(--p-primary);
}
.c-tl { top:  20px; left:  24px; }
.c-tr { top:  20px; right: 24px; }
.c-bl { bottom: 74px; left:  24px; }
.c-br { bottom: 74px; right: 24px; }

/* ── Page header ──────────────────────────────────────────────────── */
.page-hdr {
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 2.5px solid var(--p-primary);
  padding-bottom: 11px; margin-bottom: 24px;
  position: relative; z-index: 1;
}
.hdr-left {
  font-family: var(--f-body); font-weight: 700; font-size: .63rem;
  letter-spacing: .18em; text-transform: uppercase; color: var(--p-primary);
  display: flex; align-items: center; gap: 7px;
}
.hdr-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--p-secondary); flex-shrink: 0; }
.hdr-right { font-size: .63rem; letter-spacing: .1em; text-transform: uppercase; color: var(--p-text-light); }

/* ── Page footer with hard full-width delimiter ───────────────────── */
.page-ftr {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: center; align-items: center;
  border-top: 2.5px solid var(--p-primary);
  padding: 9px 30px 14px 30px;
  background: var(--p-page-bg);
  z-index: 10;
}
.ftr-title { font-size: .62rem; letter-spacing: .09em; text-transform: uppercase; color: var(--p-text-light); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
.ftr-chapter { font-size: .62rem; letter-spacing: .09em; text-transform: uppercase; color: var(--p-text-light); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
.page-num {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--p-primary); color: #fff;
  font-family: var(--f-display); font-weight: 700; font-size: .82rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ══════════════════════════════════════════════════════════════════════
   TABLE OF CONTENTS
══════════════════════════════════════════════════════════════════════ */
.toc-eyebrow {
  font-family: var(--f-body); font-weight: 800; font-size: .64rem;
  letter-spacing: .24em; text-transform: uppercase;
  color: var(--p-primary); margin-bottom: 8px;
  position: relative; z-index: 1;
}
.toc-heading {
  font-family: var(--f-display); font-weight: 700; font-size: 1.6rem;
  color: var(--p-text-dark); margin-bottom: 30px;
  position: relative; z-index: 1;
}
.toc-list { list-style: none; position: relative; z-index: 1; }
.toc-row {
  display: flex; align-items: flex-start;
  padding: 13px 0; border-bottom: 1px dashed rgba(0,0,0,.14);
}
.toc-row:last-child { border-bottom: none; }
.toc-num {
  font-family: var(--f-display); font-weight: 300; font-size: 2.1rem;
  color: var(--p-secondary); min-width: 58px; line-height: 1;
}
.toc-info { flex: 1; padding-left: 10px; }
.toc-ch-name { font-family: var(--f-body); font-weight: 800; font-size: .97rem; color: var(--p-text-dark); }
.toc-ch-sum  { font-size: .78rem; color: var(--p-text-light); line-height: 1.55; margin-top: 4px;
               display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.toc-dots { flex: 1; min-width: 20px; border-bottom: 2px dotted rgba(0,0,0,.16); margin: 0 12px; align-self: flex-end; margin-bottom: 7px; }
.toc-pnum { font-family: var(--f-body); font-weight: 800; font-size: .88rem; color: var(--p-primary); min-width: 22px; text-align: right; }

/* ══════════════════════════════════════════════════════════════════════
   CHAPTER HEADER
══════════════════════════════════════════════════════════════════════ */
.ch-block { margin-bottom: 28px; position: relative; z-index: 1; overflow: hidden; }
.ch-eyebrow {
  font-family: var(--f-body); font-weight: 800; font-size: .6rem;
  letter-spacing: .24em; text-transform: uppercase; color: var(--p-accent);
  display: flex; align-items: center; gap: 8px; margin-bottom: 7px;
}
.ch-eyebrow::after { content: ''; display: block; width: 38px; height: 2px; background: var(--p-accent); border-radius: 2px; }
.ch-bg-num {
  display: none; /* Removed: overlapped chapter title */
}
.ch-h2 {
  font-family: var(--f-display); font-weight: 700;
  font-size: clamp(1.45rem, 2.8vw, 1.95rem); line-height: 1.2;
  color: var(--p-text-dark);
  border-left: 5px solid var(--p-primary);
  padding-left: 16px;
  position: relative; z-index: 1;
}

/* ══════════════════════════════════════════════════════════════════════
   CONTENT LAYOUT
══════════════════════════════════════════════════════════════════════ */
.content { position: relative; z-index: 1; }
.content p {
  font-family: var(--f-body); font-size: .94rem; line-height: 1.8;
  color: var(--p-text-mid); margin-bottom: 13px;
}
.content strong { color: var(--p-text-dark); font-weight: 700; }
.content em { color: var(--p-primary); font-style: italic; }

.qr-row {
  display: flex; gap: 20px; align-items: flex-start;
  margin: 18px 0;
}
.qr-row .qr-content { flex: 1; min-width: 0; }

/* ══════════════════════════════════════════════════════════════════════
   QR CODE PLACEHOLDER
══════════════════════════════════════════════════════════════════════ */
.qr-box {
  flex-shrink: 0;
  width: 130px;
  display: flex; flex-direction: column; align-items: center; gap: 0;
}
.qr-frame {
  width: 130px; height: 130px;
  border: 3px solid var(--p-primary);
  border-radius: 8px;
  background: #fff;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px;
  position: relative;
  overflow: hidden;
}
.qr-frame img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  border-radius: 5px;
}
.qr-frame .qr-dummy {
  display: grid;
  grid-template-columns: repeat(7, 12px);
  grid-template-rows:    repeat(7, 12px);
  gap: 2px;
}
.qr-dummy span {
  border-radius: 1px;
  background: var(--p-primary);
  opacity: .25;
}
.qr-dummy span.qf { opacity: 1; }
.qr-frame::before,
.qr-frame::after {
  content: '';
  position: absolute;
  width: 22px; height: 22px;
  border: 3px solid var(--p-primary);
  border-radius: 3px;
}
.qr-frame::before { top: 8px;  left: 8px; }
.qr-frame::after  { top: 8px; right: 8px; }
.qr-corner-bl {
  position: absolute;
  bottom: 8px; left: 8px;
  width: 22px; height: 22px;
  border: 3px solid var(--p-primary);
  border-radius: 3px;
  pointer-events: none;
}
.qr-label {
  margin-top: 7px;
  font-family: var(--f-body); font-weight: 700; font-size: .6rem;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--p-primary); text-align: center; line-height: 1.4;
}
.qr-sub {
  font-size: .55rem; font-weight: 400;
  color: var(--p-text-light); text-align: center; margin-top: 2px;
  line-height: 1.4;
}
.qr-standalone {
  display: flex; flex-direction: column; align-items: flex-end;
  float: right; margin: 0 0 16px 20px;
}

/* ══════════════════════════════════════════════════════════════════════
   CONTENT BLOCK TYPES
══════════════════════════════════════════════════════════════════════ */
.blk-label {
  font-family: var(--f-body); font-weight: 800; font-size: .62rem;
  letter-spacing: .2em; text-transform: uppercase;
  margin-bottom: 9px;
}
.blk-concept {
  background: var(--p-light);
  border-left: 4px solid var(--p-primary);
  border-radius: 0 8px 8px 0;
  padding: 15px 18px; margin: 18px 0;
}
.blk-concept .blk-label { color: var(--p-primary); }

.blk-example {
  background: rgba(42,122,107,.07);
  border-left: 4px solid var(--p-accent);
  border-radius: 0 8px 8px 0;
  padding: 15px 18px; margin: 18px 0;
}
.blk-example .blk-label { color: var(--p-accent); }

.blk-activity {
  background: #fff;
  border: 2px solid var(--p-secondary);
  border-radius: 10px;
  padding: 16px 18px; margin: 18px 0;
}
.blk-activity .blk-label { color: var(--p-accent); }

.blk-challenge {
  background: linear-gradient(135deg, var(--p-primary), var(--p-secondary));
  border-radius: 10px;
  padding: 16px 18px; margin: 18px 0;
}
.blk-challenge .blk-label { color: rgba(255,255,255,.75); }
.blk-challenge p { color: rgba(255,255,255,.95) !important; margin: 0; }
/* Answer blank — student writes response on these printed lines */
.blk-answer-blank {
  display: block; height: 0;
  border-bottom: 1.5px solid var(--p-text-mid);
  margin: 11px 0 4px 0; width: 82%;
}
.blk-challenge .blk-answer-blank { border-bottom-color: rgba(255,255,255,.45); }

.blk-fact {
  border-top: 3px solid var(--p-accent2);
  border-bottom: 3px solid var(--p-accent2);
  background: #fff; padding: 13px 18px; margin: 18px 0;
  display: flex; gap: 14px; align-items: flex-start;
}
.blk-fact-icon { font-size: 1.5rem; flex-shrink: 0; }
.blk-fact .blk-label { color: #8A6800; }

.blk-question {
  background: var(--p-accent);
  border-radius: 50px;
  padding: 12px 22px; margin: 18px 0;
  display: flex; align-items: center; gap: 13px;
}
.blk-q-dot {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,.22);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-display); font-weight: 700; font-size: 1rem;
  color: #fff; flex-shrink: 0;
}
.blk-question p { color: #fff !important; font-weight: 600; font-size: .9rem; margin: 0; }

.img-ph {
  background: linear-gradient(135deg, var(--p-light), #fff);
  border: 2px dashed var(--p-secondary);
  border-radius: 10px; padding: 32px 20px;
  text-align: center; margin: 20px 0;
  color: var(--p-secondary);
  font-size: .82rem;
}
.img-ph-icon { font-size: 2.4rem; opacity: .45; display: block; margin-bottom: 8px; }
.img-block { margin: 20px 0; border-radius: 8px; overflow: hidden; border: 2px solid var(--p-light); box-shadow: 0 3px 12px rgba(0,0,0,.1); text-align: center; background: #fafafa; }
.img-block img { display: block; margin: 0 auto; max-width: 100%; width: auto; height: auto; max-height: 400px; object-fit: contain; }
.img-caption { font-size: .7rem; color: var(--p-text-light); font-style: italic; padding: 5px 12px; background: var(--p-light); text-align: center; }

.divider { border: none; border-top: 1px dashed rgba(0,0,0,.14); margin: 22px 0; }

/* Heading sub-section */
.blk-heading { margin: 28px 0 10px 0; padding: 0 0 8px 0; border-bottom: 2px solid var(--p-primary); }
.blk-heading h2 { font-family: var(--f-display); font-weight: 700; font-size: 1.3rem; color: var(--p-primary); margin: 0; line-height: 1.3; }

/* Bullet lists inside blocks */
.blk-list { margin: 4px 0 6px 0; padding-left: 0; list-style: none; }
.blk-list li { padding: 3px 0 3px 18px; position: relative; }
.blk-list li::before { content: '\2022'; position: absolute; left: 4px; color: var(--p-primary); font-weight: 700; }
.blk-challenge .blk-list li::before { color: rgba(255,255,255,.8); }
.blk-question .blk-list li::before { color: rgba(255,255,255,.8); }

/* Video row */
.video-row { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
.video-qr { width: 64px; height: 64px; border-radius: 6px; border: 1px solid rgba(0,0,0,.1); flex-shrink: 0; }
.video-pill { display: inline-flex; align-items: center; gap: 6px; background: #14141F; color: #fff; font-size: .73rem; font-weight: 600; padding: 5px 13px; border-radius: 20px; margin-top: 8px; text-decoration: none; }
.video-pill::before { content: '\25B6'; color: var(--p-primary); font-size: .6rem; }
.video-pill:hover { background: #2A2A3A; }

/* Block spacing */
.blk-concept p, .blk-example p, .blk-activity p, .blk-fact p { margin: 0 0 6px 0; }
.blk-concept p:last-child, .blk-example p:last-child, .blk-activity p:last-child, .blk-fact p:last-child { margin-bottom: 0; }
.blk-challenge p, .blk-challenge li { color: rgba(255,255,255,.95) !important; margin: 0 0 5px 0; }
.blk-question p, .blk-question li { color: #fff !important; font-weight: 600; font-size: .9rem; margin: 0 0 4px 0; }

/* ══════════════════════════════════════════════════════════════════════
   THEME CSS — injected by the agent per template selection
══════════════════════════════════════════════════════════════════════ */
/* THEME_CSS_PLACEHOLDER */

/* ══════════════════════════════════════════════════════════════════════
   MATH — display equation block
══════════════════════════════════════════════════════════════════════ */
.blk-math-display {
  text-align: center;
  padding: 20px 12px 16px;
  margin: 18px 0;
  background: var(--p-light);
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,.08);
  overflow-x: auto;
}
.blk-math-display .katex-display { margin: 0; }
/* Inline KaTeX inside any block */
.content .katex { font-size: 1rem; }
.content .katex-display { margin: 6px 0; }

/* ══════════════════════════════════════════════════════════════════════
   PRINT & RESPONSIVE
══════════════════════════════════════════════════════════════════════ */
@page {
  size: A4 portrait;
  margin: 0;
}
@media print {
  body { background: white; padding: 0; }
  .book-cover, .book-page {
    box-shadow: none; margin: 0;
    page-break-after: always; break-after: page;
    width: 210mm; height: 297mm; overflow: hidden;
  }
  .page-frame { height: calc(297mm - 28px); overflow: hidden; border: none; }
  .inner-border { display: none; }
  .ch-measure { display: none; }
}

@media (max-width: 860px) {
  :root { --page-w: 100%; --page-h: auto; --page-pad: 30px 26px 74px; }
  .book-page { height: auto; overflow: visible; }
  .page-frame { height: auto; overflow: visible; }
  .ch-bg-num { display: none; }
  .qr-row { flex-direction: column; }
  .qr-box { width: 100%; flex-direction: row; align-items: center; gap: 14px; }
}

<body class="pal-naranja">

<div id="app"></div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   BOOK DATA — injected by the agent (regex replaces this block)
════════════════════════════════════════════════════════════════════════ */
var BOOK = {
  palette: "pal-naranja",
  theme: {
    id: "educational",
    class: "",
    ornament: "\u2726",
    darkMode: false,
    fontDisplay: "",
    fontBody: ""
  },
  i18n: {
    index: "\u00cdndice",
    book_contents: "Contenido del Libro",
    country: "Pa\u00eds",
    method: "M\u00e9todo",
    chapters_label: "Cap\u00edtulos",
    language_label: "Idioma",
    years_old: "a\u00f1os",
    chapter: "Cap\u00edtulo",
    ch_abbr: "Cap.",
    scan_to_watch: "Escanea para ver el video",
    grade_primary: "Primaria",
    grade_secondary: "Secundaria",
    grade_high: "Preparatoria"
  },
  request: {
    topic: "Profesiones",
    age: 10,
    country: "Mexico",
    method: "Escandinavo",
    language: "Espanol",
    chapters: 2
  },
  title: "Libro de Ejemplo",
  description: "Descripcion del libro de ejemplo.",
  toc: [],
  chapters: []
};

/* ════════════════════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════════════════════ */
var I = BOOK.i18n;  /* shortcut */

function gradeLabel(age) {
  if (age <= 11) {
    var yr = Math.max(1, age - 5);
    return yr + " " + I.grade_primary;
  }
  if (age <= 14) {
    var yr = age - 11;
    return yr + " " + I.grade_secondary;
  }
  var yr = Math.min(3, age - 14);
  return yr + " " + I.grade_high;
}

function esc(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function shortTitle(t, n) {
  return t.length > n ? t.substring(0, n) + "..." : t;
}

/* ════════════════════════════════════════════════════════════════════════
   QR PLACEHOLDER BUILDER
════════════════════════════════════════════════════════════════════════ */
function renderQR(b) {
  var inner = "";
  if (b.img) {
    inner = '<img src="' + esc(b.img) + '" alt="QR Code — ' + esc(b.label) + '">';
  } else {
    inner = '<div style="position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;">';
    inner += '<div style="display:grid;grid-template-columns:repeat(5,10px);grid-template-rows:repeat(5,10px);gap:3px;opacity:.18;">';
    for (var r = 0; r < 25; r++) {
      var on = Math.random() > 0.45 ? 1 : 0;
      inner += '<div style="border-radius:1px;background:var(--p-primary);opacity:' + (on ? '1' : '0.2') + '"></div>';
    }
    inner += '</div>';
    inner += '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">';
    inner += '<div style="width:36px;height:36px;border-radius:6px;border:3px solid var(--p-primary);background:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;">&#128247;</div>';
    inner += '</div>';
    inner += '</div>';
  }

  var html = "";
  html += '<div class="qr-standalone">';
  html += '  <div class="qr-box">';
  html += '    <div class="qr-frame">';
  html += '      <span class="qr-corner-bl"></span>';
  html += '      ' + inner;
  html += '    </div>';
  html += '    <div class="qr-label">' + esc(b.label) + '</div>';
  html += '    <div class="qr-sub">' + esc(b.sub || I.scan_to_watch) + '</div>';
  html += '  </div>';
  html += '</div>';
  return html;
}

/* ════════════════════════════════════════════════════════════════════════
   TEXT RENDERER — converts plain text (with \n and • bullets) into HTML
════════════════════════════════════════════════════════════════════════ */
/* Split text on LaTeX math spans, escaping only the non-math parts.
   This lets KaTeX auto-render process $...$ without seeing HTML entities. */
function renderMathText(s) {
  var result = '';
  var remaining = s;
  /* Match $$...$$ first (display), then $...$ (inline) */
  /* Also pass \[...\] (display) and \(...\) (inline) through raw so KaTeX sees them */
  var matRe = /(\$\$[\s\S]+?\$\$|\$[^\$\n]+?\$|\\\[[\s\S]+?\\\]|\\\([^\)]+?\\\))/;
  while (remaining.length > 0) {
    var m = matRe.exec(remaining);
    if (!m) { result += esc(remaining); break; }
    if (m.index > 0) result += esc(remaining.substring(0, m.index));
    result += m[1]; /* LaTeX span — pass through raw for KaTeX */
    remaining = remaining.substring(m.index + m[1].length);
  }
  return result;
}

function renderText(raw) {
  if (!raw) return '';
  var paras = raw.split(/\n{2,}/);
  var out = '';
  for (var pi = 0; pi < paras.length; pi++) {
    var para = paras[pi].trim();
    if (!para) continue;
    var lines = para.split('\n');
    var allBullets = lines.every(function(l){ return !l.trim() || l.trim().charAt(0) === '\u2022'; });
    if (allBullets) {
      out += '<ul class="blk-list">';
      for (var li = 0; li < lines.length; li++) {
        var item = lines[li].trim().replace(/^\u2022\s*/, '');
        if (item) out += '<li>' + renderMathText(item) + '</li>';
      }
      out += '</ul>';
    } else {
      out += '<p>' + renderMathText(para).replace(/\n/g, '<br>') + '</p>';
    }
  }
  return out;
}

/* ════════════════════════════════════════════════════════════════════════
   VIDEO PILL + QR
════════════════════════════════════════════════════════════════════════ */
function renderVideoPill(b) {
  /* Only render the video row if we have a QR code.
     Text-only video descriptions without QR/URL are hidden. */
  if (!b.video_qr && !b.video_url) return '';
  var out = '<div class="video-row">';
  if (b.video_qr) {
    out += '<img class="video-qr" src="' + esc(b.video_qr) + '" alt="QR">';
  }
  if (b.video_url) {
    out += '<a class="video-pill" href="' + esc(b.video_url) + '" target="_blank" rel="noopener">' + esc(b.video) + '</a>';
  }
  out += '</div>';
  return out;
}

/* ════════════════════════════════════════════════════════════════════════
   BLOCK RENDERERS
════════════════════════════════════════════════════════════════════════ */
function renderBlock(b) {
  switch (b.type) {

    case "qr":
      return renderQR(b);

    case "heading":
      return '<div class="blk-heading"><h2>' + esc(b.text) + '</h2></div>';

    case "math_display":
      /* Standalone display equation — LaTeX rendered by KaTeX auto-render */
      return '<div class="blk-math-display">' + (b.latex || b.text || '') + '</div>';

    case "concept": {
      var cv = (b.video || b.video_qr) ? renderVideoPill(b) : "";
      return '<div class="blk-concept"><div class="blk-label">' + esc(b.label) + '</div>' + renderText(b.text) + cv + '</div>';
    }

    case "example": {
      var ev = (b.video || b.video_qr) ? renderVideoPill(b) : "";
      return '<div class="blk-example"><div class="blk-label">' + esc(b.label) + '</div>' + renderText(b.text) + ev + '</div>';
    }

    case "activity":
      var v = (b.video || b.video_qr) ? renderVideoPill(b) : "";
      return '<div class="blk-activity"><div class="blk-label">' + esc(b.label) + '</div>' + renderText(b.text) + v
           + '<div class="blk-answer-blank"></div><div class="blk-answer-blank"></div>' + '</div>';

    case "challenge": {
      var chv = (b.video || b.video_qr) ? renderVideoPill(b) : "";
      return '<div class="blk-challenge"><div class="blk-label">&#9998; ' + esc(b.label) + '</div>' + renderText(b.text) + chv
           + '<div class="blk-answer-blank"></div><div class="blk-answer-blank"></div>' + '</div>';
    }

    case "fact":
      var fv = (b.video || b.video_qr) ? renderVideoPill(b) : "";
      return '<div class="blk-fact"><div class="blk-fact-icon">&#128161;</div><div><div class="blk-label">' + esc(b.label) + '</div>' + renderText(b.text) + fv + '</div></div>';

    case "question":
      return '<div class="blk-question"><div class="blk-q-dot">?</div><div>' + renderText(b.text) + '</div></div>';

    case "image":
      if (b.url) {
        return '<div class="img-block"><img src="' + esc(b.url) + '" alt="' + esc(b.alt) + '" onerror="this.parentNode.innerHTML=\'<div class=&quot;img-ph&quot;><span class=&quot;img-ph-icon&quot;>&#128444;</span>' + esc(b.alt).replace(/'/g, "\\'") + '</div>\'"><div class="img-caption">' + esc(b.alt) + '</div></div>';
      }
      /* No URL → no image was generated for this description. Skip entirely
         instead of showing an empty dashed placeholder box. */
      return '';

    case "divider":
      return '<hr class="divider">';

    default:
      return "";
  }
}

/* ════════════════════════════════════════════════════════════════════════
   COVER
════════════════════════════════════════════════════════════════════════ */
function buildCover(d) {
  var grade = gradeLabel(d.request.age);
  var html = "";
  html += '<div class="book-cover">';
  html += '<div class="cover-badge">' + esc(grade) + " &middot; " + d.request.age + " " + esc(I.years_old) + "</div>";
  html += '<div class="cover-topic">' + esc(d.request.topic) + '</div>';
  html += '<div class="cover-title">' + esc(d.title) + '</div>';
  html += '<div class="cover-desc">'  + esc(d.description) + '</div>';
  html += '<div class="cover-meta">';
  html += mi(I.country,        d.request.country);
  html += '<div class="cover-sep"></div>';
  html += mi(I.method,         d.request.method);
  html += '<div class="cover-sep"></div>';
  html += mi(I.chapters_label, String(d.request.chapters));
  html += '<div class="cover-sep"></div>';
  html += mi(I.language_label, d.request.language);
  html += '</div>';
  /* Decorative SVG */
  html += '<svg class="cover-deco" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">';
  html += '<circle cx="120" cy="120" r="108" stroke="white" stroke-width="2"/>';
  html += '<circle cx="120" cy="120" r="80"  stroke="white" stroke-width="1.5"/>';
  html += '<circle cx="120" cy="120" r="50"  stroke="white" stroke-width="1"/>';
  html += '<line x1="12"  y1="120" x2="228" y2="120" stroke="white" stroke-width="1"/>';
  html += '<line x1="120" y1="12"  x2="120" y2="228" stroke="white" stroke-width="1"/>';
  html += '<line x1="34"  y1="34"  x2="206" y2="206" stroke="white" stroke-width=".7"/>';
  html += '<line x1="206" y1="34"  x2="34"  y2="206" stroke="white" stroke-width=".7"/>';
  html += '</svg>';
  html += '</div>';
  return html;
}
function mi(label, val) {
  return '<div class="cover-meta-item"><span>' + esc(label) + '</span><strong>' + esc(val) + '</strong></div>';
}

/* ════════════════════════════════════════════════════════════════════════
   TOC
════════════════════════════════════════════════════════════════════════ */
function buildTOC(d) {
  var grade = gradeLabel(d.request.age);
  var orn = d.theme.ornament || "\u2726";
  var html = "";

  /* Split TOC into pages of 4 chapters each — gives room for 3-line summaries */
  var ITEMS_PER_PAGE = 4;
  var totalItems = d.toc.length;
  var totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);

  for (var pg = 0; pg < totalPages; pg++) {
    var startIdx = pg * ITEMS_PER_PAGE;
    var endIdx   = Math.min(startIdx + ITEMS_PER_PAGE, totalItems);

    html += '<div class="book-page">';
    html += '<div class="page-frame">';
    html += '<div class="inner-border"></div>';
    html += '<span class="c-tl">' + orn + '</span><span class="c-tr">' + orn + '</span>';
    html += '<span class="c-bl">' + orn + '</span><span class="c-br">' + orn + '</span>';

    html += '<div class="page-hdr"></div>'; /* clean bar */

    html += '<div class="toc-eyebrow">' + esc(I.index) + '</div>';
    if (pg === 0) {
      html += '<div class="toc-heading">' + esc(I.book_contents) + '</div>';
    } else {
      html += '<div class="toc-heading">' + esc(I.book_contents) + ' (' + (pg + 1) + '/' + totalPages + ')</div>';
    }
    html += '<ul class="toc-list">';
    for (var i = startIdx; i < endIdx; i++) {
      html += '<li class="toc-row">';
      html += '<span class="toc-num">' + (i < 9 ? '0' : '') + (i + 1) + '</span>';
      html += '<div class="toc-info">';
      html += '<div class="toc-ch-name">' + esc(d.toc[i].title) + '</div>';
      html += '<div class="toc-ch-sum">'  + esc(d.toc[i].summary) + '</div>';
      html += '</div>';
      html += '<span class="toc-dots"></span>';
      html += '<span class="toc-pnum">' + (i + 1 + totalPages) + '</span>';
      html += '</li>';
    }
    html += '</ul>';

    var pageLabel = totalPages > 1 ? ('i' + (pg + 1)) : 'i';
    html += pageFooter(shortTitle(d.title, 36), pageLabel, esc(grade));
    html += '</div></div>';
  }
  return html;
}

/* ════════════════════════════════════════════════════════════════════════
   CHAPTER — Pass 1: render blocks into offscreen measure container
   Pass 2 (paginateChapters) splits them into strict A4 pages
════════════════════════════════════════════════════════════════════════ */
function buildChapter(d, ch, idx) {
  var html = '<div class="ch-measure" data-idx="' + idx + '">';
  /* chapter title node — measured to deduct from first-page budget */
  html += '<div class="ch-measure-title">';
  html += '<div class="ch-block">';
  html += '<div class="ch-eyebrow">' + esc(I.chapter) + ' ' + (idx + 1) + '</div>';
  html += '<h2 class="ch-h2">' + esc(ch.title) + '</h2>';
  html += '</div>';
  html += '</div>';
  /* each block in individual wrapper for per-block height measurement */
  for (var b = 0; b < ch.blocks.length; b++) {
    html += '<div class="ch-measure-blk">' + renderBlock(ch.blocks[b]) + '</div>';
  }
  html += '</div>';
  return html;
}

/* ════════════════════════════════════════════════════════════════════════
   CHAPTER — Pass 2: bin-pack measured blocks into exact A4 pages
════════════════════════════════════════════════════════════════════════ */
function paginateChapters(d) {
  var app      = document.getElementById('app');
  var sources  = app.querySelectorAll('.ch-measure');
  var tocPages = Math.ceil(d.toc.length / 6);

  /* ── Layout constants matching CSS (px) ───────────────────────────── */
  var PAGE_H       = 1123; /* --page-h                                         */
  var FRM_MARGIN   = 14;   /* .page-frame margin (all sides)                   */
  var BORDER       = 6;    /* .page-frame border: 6px — box-sizing:border-box  */
  var PAD_TOP      = 52;   /* .page-frame padding-top                          */
  var PAD_BOT      = 88;   /* .page-frame padding-bottom                       */
  var HDR_H        = 74;   /* .page-hdr height inc margin-bottom:24px          */
  var BLK_GAP      = 6;    /* margins are now captured by the padding:1px wrapper; +6 breathing */
  var CONT_LABEL_H = 0;    /* continuation label is hidden — no height penalty  */
  var SAFETY       = 56;   /* generous guard — repairOverflow() fixes any survivors */

  /* border-box: the 1095px frame height INCLUDES the 6px border on each side */
  var frameH  = PAGE_H - 2*FRM_MARGIN - 2*BORDER;               /* 1083 */
  var usableH = frameH - PAD_TOP - PAD_BOT - HDR_H - SAFETY;    /* 845  */

  var globalPage = 1 + tocPages; /* 1 cover + N toc pages → first chapter page */

  for (var ci = 0; ci < sources.length; ci++) {
    var src     = sources[ci];
    var idx     = parseInt(src.getAttribute('data-idx'), 10);
    var ch      = d.chapters[idx];
    var orn     = (d.theme && d.theme.ornament) || '\u2726';
    var chShort = shortTitle(ch.title, 30);

    /* Measure title block height */
    var titleNode = src.querySelector('.ch-measure-title');
    var titleH    = titleNode ? Math.ceil(titleNode.getBoundingClientRect().height) + 10 : 92;

    /* Measure each content block */
    var blkNodes   = src.querySelectorAll('.ch-measure-blk');
    var blkHeights = [];
    for (var bi = 0; bi < blkNodes.length; bi++) {
      blkHeights.push(Math.ceil(blkNodes[bi].getBoundingClientRect().height) + BLK_GAP);
    }

    /* ── Bin-pack blocks into pages ──────────────────────────────────── */
    var pages = [];          /* each entry = array of block indices   */
    var curPg = [];
    var curH  = titleH;      /* first page: title already consumes budget */

    for (var bi = 0; bi < blkHeights.length; bi++) {
      var bh = blkHeights[bi];
      /* Start new page if this block overflows AND current page is non-empty */
      if ((curH + bh) > usableH && curPg.length > 0) {
        pages.push(curPg);
        curPg = [];
        /* Continuation pages have a .ch-cont-label header — deduct its height */
        curH  = CONT_LABEL_H;
      }
      curPg.push(bi);
      curH += bh;
    }
    pages.push(curPg); /* always push last/only page */

    /* ── Build one .book-page per page slice ─────────────────────────── */
    var frag = document.createDocumentFragment();
    for (var pi = 0; pi < pages.length; pi++) {
      var isFirst = (pi === 0);
      var pNum    = globalPage + pi;
      var pageEl  = document.createElement('div');
      pageEl.className = 'book-page';
      pageEl.setAttribute('data-chapter-idx', String(idx));

      var inner = '<div class="page-frame">';
      inner += '<div class="inner-border"></div>';
      inner += '<span class="c-tl">' + orn + '</span><span class="c-tr">' + orn + '</span>';
      inner += '<span class="c-bl">' + orn + '</span><span class="c-br">' + orn + '</span>';

      /* Page header — clean bar only, no repeated title/topic text */
      inner += '<div class="page-hdr"></div>';

      /* Chapter title (first page) — continuation pages get only a thin spacer */
      if (isFirst) {
        inner += '<div class="ch-block">'
               + '<div class="ch-eyebrow">' + esc(I.chapter) + '\u00a0' + (idx + 1) + '</div>'
               + '<h2 class="ch-h2">' + esc(ch.title) + '</h2>'
               + '</div>';
      } else {
        inner += '<div class="ch-cont-label" style="visibility:hidden;height:0;margin:0;padding:0;border:none;"></div>';
      }

      /* Content blocks for this page */
      inner += '<div class="content">';
      for (var bii = 0; bii < pages[pi].length; bii++) {
        inner += blkNodes[pages[pi][bii]].innerHTML;
      }
      inner += '</div>';

      /* Footer */
      inner += pageFooter(
        shortTitle(d.title, 34),
        String(pNum),
        esc(I.ch_abbr) + '\u00a0' + (idx + 1)
          + (pages.length > 1 ? '\u2002(' + (pi + 1) + '/' + pages.length + ')' : '')
          + '\u2003\u2014\u2003' + esc(chShort)
      );
      inner += '</div>'; /* close .page-frame */

      pageEl.innerHTML = inner;
      frag.appendChild(pageEl);
    }

    globalPage += pages.length;

    /* Insert pages before the measure container, then remove it */
    app.insertBefore(frag, src);
    app.removeChild(src);
  }
}

/* ════════════════════════════════════════════════════════════════════════
   BLOCK SPLITTER — splits a single oversized block at the child midpoint.
   Returns the new second-half element (already contains the moved nodes),
   or null if the block cannot be split further.
════════════════════════════════════════════════════════════════════════ */
function splitOversizedBlock(blockEl) {
  var kids     = Array.from(blockEl.children);
  var hasLabel = kids.length > 0 && kids[0].classList.contains('blk-label');
  var startIdx = hasLabel ? 1 : 0;          /* first non-label child index */
  var content  = kids.slice(startIdx);

  /* ── Single child: split text at sentence boundaries ─────────────── */
  if (content.length < 2) {
    if (content.length === 1) {
      var child = content[0];
      var html  = child.innerHTML;
      /* Collect all sentence-end positions: [.!?] followed by whitespace */
      var ends = [];
      for (var si = 0; si < html.length - 1; si++) {
        var ch = html[si];
        if (ch === '.' || ch === '!' || ch === '?') {
          if (html[si + 1] === ' ' || html[si + 1] === '\n') ends.push(si + 1);
        }
      }
      var splitPos = -1;
      if (ends.length >= 2) {
        splitPos = ends[Math.floor(ends.length * 0.55)];
      } else {
        /* fallback: nearest word boundary at ~55 % of character count */
        var target = Math.floor(html.length * 0.55);
        splitPos = html.lastIndexOf(' ', target);
        if (splitPos < 20) return null;
      }
      var firstHtml  = html.substring(0, splitPos).trim();
      var secondHtml = html.substring(splitPos).trim();
      if (!secondHtml) return null;
      child.innerHTML = firstHtml;
      var secondHalf = blockEl.cloneNode(false);
      if (hasLabel) {
        var lc2 = kids[0].cloneNode(true);
        lc2.style.opacity = '0.4';
        secondHalf.appendChild(lc2);
      }
      var newChild = child.cloneNode(false);
      newChild.innerHTML = secondHtml;
      secondHalf.appendChild(newChild);
      return secondHalf;
    }
    return null;      /* truly unsplittable (e.g. single image) */
  }

  /* ── Multiple children: split at height midpoint ─────────────────── */
  var totalH = blockEl.getBoundingClientRect().height;
  var accum  = 0;
  var splitAt = startIdx + 1;               /* keep at least one content child */
  for (var i = 0; i < content.length - 1; i++) {
    accum  += content[i].getBoundingClientRect().height;
    splitAt = startIdx + i + 1;
    if (accum >= totalH * 0.55) break;
  }

  /* Build second-half clone (same tag + classes, shallow) */
  var secondHalf = blockEl.cloneNode(false);
  if (hasLabel) {
    /* Carry a dimmed label so the reader sees context on the continuation */
    var lc = kids[0].cloneNode(true);
    lc.style.opacity = '0.4';
    secondHalf.appendChild(lc);
  }
  /* Move live DOM nodes (not innerHTML copies) so we don't duplicate ids */
  var toMove = kids.slice(splitAt);
  for (var j = 0; j < toMove.length; j++) {
    secondHalf.appendChild(toMove[j]);
  }
  /* Guard: second half must have real content beyond just the label */
  var realKids = secondHalf.children.length - (hasLabel ? 1 : 0);
  if (realKids < 1) return null;
  return secondHalf;
}

/* ════════════════════════════════════════════════════════════════════════
   PASS 4 — POST-RENDER OVERFLOW REPAIR
   Runs AFTER KaTeX so all block heights reflect actual rendered math.

   Step A — pre-pass: split any individual block taller than MAX_BLK_H
             into two sibling blocks at its child midpoint.
   Step B — main loop: move overflow blocks to the next page (or a newly
             cloned continuation page). Repeats until stable.
════════════════════════════════════════════════════════════════════════ */
function repairOverflow() {
  var MAX_PASSES = 18;
  var MAX_BLK_H  = 700; /* blocks taller than this are split before moving */

  /* ── Step A: split oversized individual blocks ────────────────────── */
  /* Run several sub-passes because splitting creates new siblings that may
     themselves still be too tall. */
  for (var sp = 0; sp < 6; sp++) {
    var changed = false;
    var allContents = Array.from(document.querySelectorAll('.content'));
    for (var ci = 0; ci < allContents.length; ci++) {
      var kids = Array.from(allContents[ci].children);
      for (var ki = 0; ki < kids.length; ki++) {
        if (kids[ki].getBoundingClientRect().height <= MAX_BLK_H) continue;
        var second = splitOversizedBlock(kids[ki]);
        if (!second) continue;
        var ref = kids[ki].nextSibling;
        allContents[ci].insertBefore(second, ref || null);
        kids.splice(ki + 1, 0, second); /* keep loop in sync */
        changed = true;
      }
    }
    if (!changed) break;
  }

  /* ── Step B: move overflow blocks to next / new page ─────────────── */
  for (var pass = 0; pass < MAX_PASSES; pass++) {
    var pages    = Array.from(document.querySelectorAll('.book-page'));
    var anyFixed = false;

    for (var pi = 0; pi < pages.length; pi++) {
      var pageEl  = pages[pi];
      var frame   = pageEl.querySelector('.page-frame');
      if (!frame) continue;
      var ftr     = frame.querySelector('.page-ftr');
      var content = frame.querySelector('.content');
      if (!ftr || !content) continue;

      /* Expose overflow temporarily for accurate measurements */
      frame.style.overflow = 'visible';
      var ftrTop = ftr.getBoundingClientRect().top - 8;
      var blks   = Array.from(content.children);

      var overflow = [];
      for (var bi = 0; bi < blks.length; bi++) {
        if (blks[bi].getBoundingClientRect().bottom > ftrTop) overflow.push(blks[bi]);
      }
      frame.style.overflow = '';

      if (overflow.length === 0) continue;

      /* Keep the first block when ALL overflow to prevent infinite loops */
      var toMove = (overflow.length === blks.length) ? overflow.slice(1) : overflow;

      /* When the very first block itself overflows (all-overflow guard fired),
         try to split it at sentence boundaries so its visible first portion
         stays on this page and the continuation is pushed to the next page. */
      if (overflow.length === blks.length && overflow.length > 0) {
        var splitResult = splitOversizedBlock(overflow[0]);
        if (splitResult) {
          content.insertBefore(splitResult, overflow[0].nextSibling || null);
          anyFixed = true;
          /* Re-measure: the split may have made the first block short enough */
          frame.style.overflow = 'visible';
          var ftrTop2  = ftr.getBoundingClientRect().top - 8;
          var blks2    = Array.from(content.children);
          var toMove2  = [];
          var allOver2 = true;
          for (var b2 = 0; b2 < blks2.length; b2++) {
            if (blks2[b2].getBoundingClientRect().bottom > ftrTop2) {
              toMove2.push(blks2[b2]);
            } else { allOver2 = false; }
          }
          frame.style.overflow = '';
          toMove = allOver2 ? toMove2.slice(1) : toMove2;
          blks   = blks2;
        }
      }

      if (toMove.length === 0) continue;

      var movedHTML = '';
      for (var oi = 0; oi < toMove.length; oi++) {
        movedHTML += toMove[oi].outerHTML;
        content.removeChild(toMove[oi]);
      }

      /* Only pass overflow to the next page when it belongs to the SAME
         chapter.  If the next page is a different chapter (or TOC/cover)
         we must create a brand-new continuation page so content is never
         lost or injected into an unrelated chapter. */
      var myChIdx  = pageEl.getAttribute('data-chapter-idx');
      var nextPage = pages[pi + 1];
      var isSameCh = nextPage && nextPage.getAttribute('data-chapter-idx') === myChIdx;
      var nextContent = isSameCh ? nextPage.querySelector('.content') : null;

      if (nextContent) {
        nextContent.insertAdjacentHTML('afterbegin', movedHTML);
      } else {
        /* Build a fresh continuation page by cloning the current page shell
           (keeps frame, header, footer, ornaments) then:
           – replace any chapter-title block with a compact cont-label
           – replace the content area with the overflow blocks             */
        var newPage  = pageEl.cloneNode(true);
        newPage.setAttribute('data-chapter-idx', myChIdx);

        var newFrame = newPage.querySelector('.page-frame');
        if (newFrame) {
          /* Swap full chapter-title (.ch-block) → invisible spacer (clean pages) */
          var chBlock = newFrame.querySelector(':scope > .ch-block');
          if (chBlock) {
            var contLbl = document.createElement('div');
            contLbl.className = 'ch-cont-label';
            contLbl.style.cssText = 'visibility:hidden;height:0;margin:0;padding:0;border:none;';
            chBlock.parentNode.replaceChild(contLbl, chBlock);
          }
          /* Replace content */
          var nc = newFrame.querySelector('.content');
          if (nc) nc.innerHTML = movedHTML;
        }

        /* Insert immediately after the current page, before any next-chapter page */
        var insertBefore = nextPage || null;
        pageEl.parentNode.insertBefore(newPage, insertBefore);
        pages.splice(pi + 1, 0, newPage);
      }
      anyFixed = true;
    }
    if (!anyFixed) break;
  }
}

/* ════════════════════════════════════════════════════════════════════════
   PAGE FOOTER
════════════════════════════════════════════════════════════════════════ */
function pageFooter(title, num, chapter) {
  return '<div class="page-ftr"><div class="page-num">' + esc(num) + '</div></div>';
}

/* ════════════════════════════════════════════════════════════════════════
   ASSEMBLE & RENDER
════════════════════════════════════════════════════════════════════════ */
function render(d) {
  /* Apply palette */
  var cls = d.palette || "pal-naranja";
  /* Apply theme class */
  if (d.theme && d.theme.class) cls += " " + d.theme.class;
  document.body.className = cls;

  /* Apply font overrides */
  if (d.theme && d.theme.fontDisplay) {
    document.documentElement.style.setProperty("--f-display", d.theme.fontDisplay);
  }
  if (d.theme && d.theme.fontBody) {
    document.documentElement.style.setProperty("--f-body", d.theme.fontBody);
  }
  /* Dark-mode: ensure html background matches for scroll overflow */
  if (d.theme && d.theme.darkMode) {
    document.documentElement.style.background = "#0A0608";
  }

  var html = "";
  html += buildCover(d);
  html += buildTOC(d);
  for (var c = 0; c < d.chapters.length; c++) {
    html += buildChapter(d, d.chapters[c], c);
  }
  document.getElementById("app").innerHTML = html;

  /* Pass 2: split each chapter's blocks into strict A4-sized pages */
  paginateChapters(d);

  /* Pass 3: render LaTeX FIRST so block heights include KaTeX elements */
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(document.getElementById('app'), {
      delimiters: [
        { left: '$$',  right: '$$',  display: true  },
        { left: '\\[', right: '\\]', display: true  },
        { left: '$',   right: '$',   display: false },
        { left: '\\(', right: '\\)', display: false }
      ],
      throwOnError: false
    });
  }

  /* Pass 4: post-render overflow repair — measures ACTUAL post-KaTeX heights */
  repairOverflow();
}

render(BOOK);
</script>
</body>
