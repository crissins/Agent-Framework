<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro Educativo — Workbook</title>
<style>
/* ══════════════════════════════════════════════════════════════════════
   WORKBOOK TEMPLATE — Print-first, black & white, minimal ink
   Inspired by SEP / Larousse activity books
   NO background colors · NO gradients · NO decorative fills
   Just paper + black ink
══════════════════════════════════════════════════════════════════════ */

:root {
  --ink      : #1A1A1A;
  --ink-mid  : #3A3A3A;
  --ink-light: #6A6A6A;
  --rule     : #BBBBBB;
  --page-bg  : #FFFFFF;
  --page-w   : 780px;

  --f-body   : Georgia, 'Times New Roman', serif;
  --f-sans   : 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

/* ── Reset ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; background: #E8E4E0; }
body {
  font-family: var(--f-body);
  background: #E8E4E0;
  color: var(--ink);
  padding: 36px 16px 72px;
}

/* ══════════════════════════════════════════════════════════════════════
   COVER — minimal, text only, a single accent stripe
══════════════════════════════════════════════════════════════════════ */
.book-cover {
  width: var(--page-w);
  max-width: 100%;
  margin: 0 auto 18px;
  background: var(--page-bg);
  box-shadow: -6px 0 0 rgba(0,0,0,.2), 0 3px 18px rgba(0,0,0,.15);
  position: relative;
  padding: 0;
  height: 1123px;
  overflow: hidden;
}

.cover-stripe {
  height: 8px;
  background: var(--ink);
}

.cover-body {
  padding: 52px 60px 48px;
  border-left: 1px solid var(--rule);
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}

.cover-badge {
  display: inline-block;
  border: 1px solid var(--ink);
  font-family: var(--f-sans);
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-mid);
  padding: 3px 10px;
  margin-bottom: 28px;
}

.cover-topic {
  font-family: var(--f-sans);
  font-size: .7rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 10px;
}

.cover-title {
  font-family: var(--f-body);
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 700;
  line-height: 1.15;
  color: var(--ink);
  margin-bottom: 16px;
}

.cover-rule-ornament {
  display: flex; align-items: center; gap: 10px;
  margin: 18px 0;
}
.cover-rule-ornament::before,
.cover-rule-ornament::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
.cover-rule-ornament span { font-size: .7rem; color: var(--ink-light); }

.cover-desc {
  font-family: var(--f-body);
  font-size: .92rem;
  line-height: 1.72;
  color: var(--ink-mid);
  max-width: 480px;
}

.cover-meta {
  display: flex; flex-wrap: wrap; gap: 0 32px;
  margin-top: 36px;
  padding-top: 16px;
  border-top: 1px solid var(--rule);
}
.cover-meta-item {
  display: flex; flex-direction: column; gap: 1px;
}
.cover-meta-item span {
  font-family: var(--f-sans);
  font-size: .6rem;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--ink-light);
}
.cover-meta-item strong {
  font-family: var(--f-sans);
  font-size: .82rem;
  color: var(--ink);
  font-weight: 600;
}

/* ══════════════════════════════════════════════════════════════════════
   PAGE SHELL
══════════════════════════════════════════════════════════════════════ */
.book-page {
  width: var(--page-w);
  max-width: 100%;
  margin: 0 auto 18px;
  background: var(--page-bg);
  box-shadow: -6px 0 0 rgba(0,0,0,.18), 0 2px 14px rgba(0,0,0,.12);
  position: relative;
  height: 1123px; /* A4 fixed — prevents footer overlap */
  overflow: hidden;
  display: flex; flex-direction: column;
}

/* ── Running header ─────────────────────────────────────────────────── */
.running-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 44px 8px;
  border-bottom: 1px solid var(--ink);
  flex-shrink: 0;
}
.rh-subject {
  font-family: var(--f-body);
  font-style: italic;
  font-size: .8rem;
  color: var(--ink-mid);
}
.rh-page-marker {
  width: 18px; height: 18px;
  border: 1px solid var(--ink-light);
  background: #fff;
  flex-shrink: 0;
}

/* ── Page content area ─────────────────────────────────────────────── */
.page-body {
  padding: 22px 44px 64px;
  flex: 1;
  overflow: hidden; /* clips content before it reaches footer */
}

/* ── Running footer ─────────────────────────────────────────────────── */
.running-ftr {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 8px 44px 14px;
  border-top: 1px solid var(--rule);
  display: flex; justify-content: space-between; align-items: center;
}
.rf-aprendizaje {
  font-family: var(--f-body);
  font-size: .72rem;
  color: var(--ink-mid);
}
.rf-aprendizaje strong { font-weight: 700; }
.page-num {
  font-family: var(--f-body);
  font-size: .88rem;
  color: var(--ink-mid);
}
.rf-marker {
  width: 18px; height: 18px;
  border: 1px solid var(--ink-light);
  background: #fff;
  flex-shrink: 0;
}

/* ══════════════════════════════════════════════════════════════════════
   TOC
══════════════════════════════════════════════════════════════════════ */
.toc-eyebrow {
  font-family: var(--f-sans);
  font-size: .62rem; letter-spacing: .2em; text-transform: uppercase;
  color: var(--ink-light); margin-bottom: 5px;
}
.toc-heading {
  font-family: var(--f-body);
  font-size: 1.55rem; font-weight: 700;
  color: var(--ink); margin-bottom: 4px;
}
.toc-divider { border: none; border-top: 1px solid var(--ink); margin-bottom: 22px; }

.toc-list { list-style: none; }
.toc-row {
  display: flex; align-items: baseline;
  padding: 10px 0;
  border-bottom: 1px dotted var(--rule);
}
.toc-row:last-child { border-bottom: none; }
.toc-num {
  font-family: var(--f-body);
  font-size: 1.3rem; font-style: italic;
  color: var(--ink-light);
  min-width: 38px; flex-shrink: 0;
}
.toc-info { flex: 1; padding: 0 6px; }
.toc-ch-name { font-family: var(--f-body); font-size: .94rem; font-weight: 700; color: var(--ink); }
.toc-ch-sum  { font-family: var(--f-body); font-size: .78rem; font-style: italic; color: var(--ink-light); margin-top: 2px; line-height: 1.45; }
.toc-dots    { flex: 1; min-width: 24px; border-bottom: 1px dotted var(--rule); margin: 0 8px; align-self: flex-end; margin-bottom: 4px; }
.toc-pnum    { font-family: var(--f-body); font-size: .85rem; color: var(--ink-mid); min-width: 18px; text-align: right; flex-shrink: 0; }

/* ══════════════════════════════════════════════════════════════════════
   CHAPTER HEADING
══════════════════════════════════════════════════════════════════════ */
.ch-block { margin-bottom: 20px; }
.ch-eyebrow {
  font-family: var(--f-sans); font-size: .62rem;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--ink-light); margin-bottom: 5px;
}
.ch-title {
  font-family: var(--f-body);
  font-size: 1.45rem; font-weight: 700;
  color: var(--ink); line-height: 1.2;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 8px;
}

/* ══════════════════════════════════════════════════════════════════════
   CONTENT BLOCKS — all black & white, minimal ink
══════════════════════════════════════════════════════════════════════ */

/* Generic label */
.blk-label {
  font-family: var(--f-sans);
  font-size: .6rem; letter-spacing: .16em; text-transform: uppercase;
  color: var(--ink-light); margin-bottom: 5px;
}

/* Instruction/concept — just a top thin rule */
.blk-concept {
  border-top: 1px solid var(--rule);
  padding: 12px 0;
  margin: 14px 0;
}
.blk-concept .blk-label { color: var(--ink-mid); }

/* Example — indented */
.blk-example {
  margin: 12px 0 12px 20px;
  padding-left: 12px;
  border-left: 2px solid var(--rule);
}
.blk-example .blk-label { color: var(--ink-light); }

/* Activity — bold instruction, then dotted lines for student work */
.blk-activity {
  margin: 16px 0;
}
.blk-activity .blk-label { color: var(--ink); }

/* Writing lines after activity */
.write-lines {
  margin-top: 12px;
}
.write-line {
  border-bottom: 1px solid var(--rule);
  height: 28px;
  margin-bottom: 0;
}

/* Challenge — outlined box, no fill */
.blk-challenge {
  border: 1.5px solid var(--ink);
  padding: 12px 14px;
  margin: 16px 0;
}
.blk-challenge .blk-label { color: var(--ink); }

/* Fact — thin rules above/below */
.blk-fact {
  border-top: 1.5px solid var(--ink-mid);
  border-bottom: 1px solid var(--rule);
  padding: 10px 0;
  margin: 14px 0;
  display: flex; gap: 10px; align-items: flex-start;
}
.blk-fact-icon { font-size: .9rem; flex-shrink: 0; color: var(--ink-mid); }
.blk-fact .blk-label { color: var(--ink-mid); }

/* Question — indented with a ? marker */
.blk-question {
  display: flex; gap: 8px; align-items: flex-start;
  padding: 10px 0;
  border-bottom: 1px dotted var(--rule);
  margin: 10px 0;
}
.blk-q-dot {
  font-family: var(--f-body);
  font-size: 1rem; font-style: italic; font-weight: 700;
  color: var(--ink-mid); flex-shrink: 0; padding-top: 1px;
}

/* Sub-heading */
.blk-heading {
  margin: 22px 0 10px;
  border-bottom: 1px solid var(--ink);
  padding-bottom: 5px;
}
.blk-heading h2 {
  font-family: var(--f-body);
  font-size: 1.05rem; font-weight: 700;
  color: var(--ink);
}

/* Divider */
.divider {
  border: none;
  border-top: 1px dotted var(--rule);
  margin: 16px 0;
}

/* ══════════════════════════════════════════════════════════════════════
   PROSE
══════════════════════════════════════════════════════════════════════ */
.content p {
  font-family: var(--f-body);
  font-size: .9rem; line-height: 1.78;
  color: var(--ink-mid);
  margin-bottom: 9px;
}
.content strong { color: var(--ink); font-weight: 700; }
.content em { font-style: italic; }

.blk-concept p,
.blk-example p,
.blk-activity p,
.blk-challenge p,
.blk-fact p,
.blk-question p {
  font-family: var(--f-body);
  font-size: .9rem; line-height: 1.72;
  color: var(--ink-mid); margin: 0 0 5px;
}
.blk-concept p:last-child,
.blk-example p:last-child,
.blk-activity p:last-child,
.blk-challenge p:last-child,
.blk-fact p:last-child,
.blk-question p:last-child { margin-bottom: 0; }

/* Lists */
.blk-list { list-style: none; margin: 5px 0; padding-left: 0; }
.blk-list li {
  font-family: var(--f-body);
  font-size: .88rem; line-height: 1.65;
  color: var(--ink-mid);
  padding: 2px 0 2px 16px;
  position: relative;
}
.blk-list li::before {
  content: '—'; position: absolute; left: 0;
  color: var(--ink-light);
}

/* ══════════════════════════════════════════════════════════════════════
   IMAGE GRID — "multiple pictures with text below in the same page"
══════════════════════════════════════════════════════════════════════ */

/* Single image */
.img-block {
  margin: 16px 0;
  border: 1px solid var(--rule);
  overflow: hidden;
}
.img-block img { width: 100%; display: block; max-height: 340px; object-fit: cover; }
.img-caption {
  font-family: var(--f-body);
  font-size: .7rem; font-style: italic;
  color: var(--ink-light);
  padding: 5px 10px;
  border-top: 1px solid var(--rule);
  text-align: center;
}
.img-ph {
  border: 1px dashed var(--rule);
  background: #FAFAFA;
  text-align: center;
  padding: 24px 16px;
  margin: 16px 0;
  color: var(--ink-light);
  font-size: .8rem; font-style: italic;
}
.img-ph-icon { font-size: 1.8rem; display: block; opacity: .25; margin-bottom: 6px; }

/* Image grid — 2 or 3 columns of pictures, each with a caption below */
.img-grid {
  display: grid;
  gap: 16px;
  margin: 18px 0;
}
.img-grid[data-cols="2"] { grid-template-columns: 1fr 1fr; }
.img-grid[data-cols="3"] { grid-template-columns: 1fr 1fr 1fr; }
.img-grid[data-cols="4"] { grid-template-columns: 1fr 1fr 1fr 1fr; }
.img-grid[data-cols="1"] { grid-template-columns: 1fr; }

.img-grid-item {
  display: flex; flex-direction: column;
}
.img-grid-frame {
  border: 1px solid var(--rule);
  overflow: hidden;
  background: #FAFAFA;
  flex: 1;
  min-height: 100px;
  display: flex; align-items: center; justify-content: center;
}
.img-grid-frame img {
  width: 100%; height: 100%;
  object-fit: contain; display: block;
}
.img-grid-frame .img-ph-inner {
  text-align: center; padding: 16px 8px;
  color: var(--ink-light); font-size: .75rem; font-style: italic;
}
.img-grid-frame .img-ph-inner span { font-size: 1.5rem; display: block; opacity: .2; margin-bottom: 4px; }
.img-grid-caption {
  font-family: var(--f-body);
  font-size: .78rem;
  color: var(--ink-mid);
  text-align: center;
  padding: 5px 4px 0;
  line-height: 1.4;
}

/* ══════════════════════════════════════════════════════════════════════
   QR CODE
══════════════════════════════════════════════════════════════════════ */
.qr-standalone {
  float: right; margin: 0 0 12px 16px;
  display: flex; flex-direction: column; align-items: center;
}
.qr-frame {
  width: 88px; height: 88px;
  border: 1px solid var(--rule);
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.qr-frame img { width: 100%; height: 100%; object-fit: cover; }
.qr-frame::before,
.qr-frame::after {
  content: ''; position: absolute;
  width: 14px; height: 14px;
  border: 1.5px solid var(--ink-mid);
}
.qr-frame::before { top: 5px; left: 5px; }
.qr-frame::after  { top: 5px; right: 5px; }
.qr-corner-bl {
  position: absolute; bottom: 5px; left: 5px;
  width: 14px; height: 14px;
  border: 1.5px solid var(--ink-mid);
  pointer-events: none;
}
.qr-label {
  font-family: var(--f-sans);
  font-size: .56rem; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-light); text-align: center; margin-top: 4px;
}
.qr-sub {
  font-size: .54rem; color: var(--ink-light);
  font-style: italic; text-align: center; margin-top: 1px;
}

/* Video */
.video-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.video-pill {
  display: inline-flex; align-items: center; gap: 5px;
  border: 1px solid var(--ink);
  color: var(--ink);
  font-family: var(--f-sans); font-size: .7rem;
  padding: 3px 10px; text-decoration: none;
}
.video-pill::before { content: '▶'; font-size: .5rem; }

/* ══════════════════════════════════════════════════════════════════════
   PRINT
══════════════════════════════════════════════════════════════════════ */
@page { size: A4 portrait; margin: 0; }
@media print {
  html, body { background: white; padding: 0; }
  .book-cover, .book-page {
    box-shadow: none; page-break-after: always; break-after: page;
    margin: 0; width: 210mm; height: 297mm; overflow: hidden;
  }
  .ch-measure { display: none; }
}
@media (max-width: 820px) {
  :root { --page-w: 100%; }
  .page-body { padding: 18px 22px 60px; }
  .running-hdr, .running-ftr { padding-left: 22px; padding-right: 22px; }
  .img-grid[data-cols="3"] { grid-template-columns: 1fr 1fr; }
  .img-grid[data-cols="4"] { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ════════════════════════════════════════════════════════════════════════
   BOOK DATA — same contract as original template
   NEW: img-grid block type for multiple pictures with captions
════════════════════════════════════════════════════════════════════════ */
var BOOK = {
  palette: "",
  theme: { id: "workbook", ornament: "◆" },
  i18n: {
    index: "Índice",
    book_contents: "Contenido del Libro",
    country: "País",
    method: "Método",
    chapters_label: "Capítulos",
    language_label: "Idioma",
    years_old: "años",
    chapter: "Capítulo",
    ch_abbr: "Cap.",
    scan_to_watch: "Escanea para ver el video",
    grade_primary: "Primaria",
    grade_secondary: "Secundaria",
    grade_high: "Preparatoria",
    aprendizaje: "Aprendizaje esperado"
  },
  request: {
    topic: "Pensamiento matemático",
    age: 6,
    country: "México",
    method: "SEP",
    language: "Español",
    chapters: 2
  },
  title: "Libro de Actividades",
  description: "Actividades de aprendizaje para el desarrollo de habilidades matemáticas y del pensamiento lógico.",
  toc: [
    {
      title: "Conteo y colecciones",
      summary: "Contar objetos, reconocer cantidades y comparar colecciones."
    },
    {
      title: "Formas geométricas",
      summary: "Identificar y trazar figuras geométricas en el entorno."
    }
  ],
  chapters: [
    {
      title: "Conteo y colecciones",
      aprendizaje: "Cuenta colecciones de objetos.",
      blocks: [
        {
          type: "activity",
          label: "Actividad",
          text: "Colorea 3 vestidos, 5 pantalones y 6 playeras.",
          write_lines: 0
        },
        {
          /* NEW block type: img-grid */
          type: "img-grid",
          cols: 4,
          items: [
            { alt: "Vestido 1" },
            { alt: "Pantalón 1" },
            { alt: "Playera 1" },
            { alt: "Vestido 2" },
            { alt: "Pantalón 2" },
            { alt: "Playera 2" },
            { alt: "Vestido 3" },
            { alt: "Pantalón 3" },
            { alt: "Playera 3" },
            { alt: "Vestido 4" },
            { alt: "Pantalón 4" },
            { alt: "Playera 4" }
          ]
        },
        {
          type: "question",
          text: "¿Cuántas prendas hay en total? Escribe el número en la línea."
        },
        {
          type: "write_lines",
          lines: 2
        }
      ]
    },
    {
      title: "Formas geométricas",
      aprendizaje: "Reproduce modelos con formas geométricas.",
      blocks: [
        {
          type: "activity",
          label: "Actividad",
          text: "Localiza los cuadrados que hay en este cuarto y trázalos.",
          write_lines: 0
        },
        {
          type: "img-grid",
          cols: 2,
          items: [
            { alt: "Reloj con marco cuadrado en la pared", caption: "Reloj" },
            { alt: "Librero con cuadros y rectángulos", caption: "Librero" }
          ]
        },
        {
          type: "concept",
          label: "Recuerda",
          text: "Un cuadrado tiene 4 lados iguales y 4 esquinas. Búscalos en las imágenes de arriba."
        },
        {
          type: "activity",
          label: "Traza aquí",
          text: "Dibuja los cuadrados que encontraste.",
          write_lines: 5
        },
        {
          type: "fact",
          label: "¿Sabías que?",
          text: "Los cuadrados son una de las formas más comunes en la arquitectura y el diseño de objetos cotidianos."
        },
        {
          type: "challenge",
          label: "Reto",
          text: "Busca en tu casa tres objetos que tengan forma de cuadrado. Escribe sus nombres:\n\n1. _______________\n2. _______________\n3. _______________"
        }
      ]
    }
  ]
};

/* ════════════════════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════════════════════ */
var I = BOOK.i18n;

function gradeLabel(age) {
  if (age <= 11) return Math.max(1, age - 5) + "° " + I.grade_primary;
  if (age <= 14) return (age - 11) + "° " + I.grade_secondary;
  return Math.min(3, age - 14) + "° " + I.grade_high;
}
function esc(s) {
  return String(s || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function shortTitle(t, n) { return t.length > n ? t.substring(0, n) + "…" : t; }

/* ── Text renderer ──────────────────────────────────────────────────── */
function renderText(raw) {
  if (!raw) return '';
  var out = '', paras = raw.split(/\n{2,}/);
  for (var pi = 0; pi < paras.length; pi++) {
    var para = paras[pi].trim();
    if (!para) continue;
    var lines = para.split('\n');
    var allBullets = lines.every(function(l){ return !l.trim() || l.trim().charAt(0) === '•'; });
    if (allBullets) {
      out += '<ul class="blk-list">';
      lines.forEach(function(l){ var item = l.trim().replace(/^•\s*/, ''); if (item) out += '<li>' + esc(item) + '</li>'; });
      out += '</ul>';
    } else {
      out += '<p>' + esc(para).replace(/\n/g, '<br>') + '</p>';
    }
  }
  return out;
}

/* ── Write lines ──────────────────────────────────────────────────── */
function renderWriteLines(n) {
  if (!n || n < 1) return '';
  var out = '<div class="write-lines">';
  for (var i = 0; i < n; i++) out += '<div class="write-line"></div>';
  return out + '</div>';
}

/* ── QR ─────────────────────────────────────────────────────────────── */
function renderQR(b) {
  var inner = b.img
    ? '<img src="'+esc(b.img)+'" alt="'+esc(b.label)+'">'
    : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#aaa;">📷</div>';
  return '<div class="qr-standalone"><div class="qr-frame"><span class="qr-corner-bl"></span>'+inner+'</div>' +
    '<div class="qr-label">'+esc(b.label)+'</div><div class="qr-sub">'+esc(b.sub||I.scan_to_watch)+'</div></div>';
}

/* ── Image grid ─────────────────────────────────────────────────────── */
function renderImgGrid(b) {
  var cols = b.cols || 3;
  var items = (b.items || []).map(function(it) {
    var frame = it.url
      ? '<img src="'+esc(it.url)+'" alt="'+esc(it.alt)+'">'
      : '<div class="img-ph-inner"><span>🖼</span>'+esc(it.alt)+'</div>';
    var caption = it.caption
      ? '<div class="img-grid-caption">'+esc(it.caption)+'</div>'
      : '';
    return '<div class="img-grid-item"><div class="img-grid-frame" style="min-height:90px;">'+frame+'</div>'+caption+'</div>';
  }).join('');
  return '<div class="img-grid" data-cols="'+cols+'">'+items+'</div>';
}

/* ── Video pill ──────────────────────────────────────────────────── */
function renderVideoPill(b) {
  var out = '<div class="video-row">';
  if (b.video_url) out += '<a class="video-pill" href="'+esc(b.video_url)+'" target="_blank" rel="noopener">'+esc(b.video)+'</a>';
  else if (b.video) out += '<span class="video-pill">'+esc(b.video)+'</span>';
  return out + '</div>';
}

/* ── Blocks ──────────────────────────────────────────────────────── */
function renderBlock(b) {
  switch (b.type) {
    case "qr":
      return renderQR(b);
    case "img-grid":
      return renderImgGrid(b);
    case "image":
      if (b.url) return '<div class="img-block"><img src="'+esc(b.url)+'" alt="'+esc(b.alt)+'"><div class="img-caption">'+esc(b.alt)+'</div></div>';
      return '<div class="img-ph"><span class="img-ph-icon">🖼</span>'+esc(b.alt)+'</div>';
    case "write_lines":
      return renderWriteLines(b.lines || 3);
    case "heading":
      return '<div class="blk-heading"><h2>'+esc(b.text)+'</h2></div>';
    case "concept":
      return '<div class="blk-concept"><div class="blk-label">'+esc(b.label)+'</div>'+renderText(b.text)+'</div>';
    case "example":
      return '<div class="blk-example"><div class="blk-label">'+esc(b.label)+'</div>'+renderText(b.text)+'</div>';
    case "activity":
      return '<div class="blk-activity"><div class="blk-label">'+esc(b.label)+'</div>'+renderText(b.text)+(b.video?renderVideoPill(b):'')+renderWriteLines(b.write_lines||0)+'</div>';
    case "challenge":
      return '<div class="blk-challenge"><div class="blk-label">'+esc(b.label)+'</div>'+renderText(b.text)+'</div>';
    case "fact":
      return '<div class="blk-fact"><div class="blk-fact-icon">◉</div><div><div class="blk-label">'+esc(b.label)+'</div>'+renderText(b.text)+(b.video?renderVideoPill(b):'')+'</div></div>';
    case "question":
      return '<div class="blk-question"><div class="blk-q-dot">?</div><div>'+renderText(b.text)+'</div></div>';
    case "divider":
      return '<hr class="divider">';
    default:
      return '';
  }
}

/* ════════════════════════════════════════════════════════════════════════
   COVER
════════════════════════════════════════════════════════════════════════ */
function buildCover(d) {
  var grade = gradeLabel(d.request.age);
  return [
    '<div class="book-cover">',
    '  <div class="cover-stripe"></div>',
    '  <div class="cover-body">',
    '    <div class="cover-badge">'+esc(grade)+' &middot; '+d.request.age+' '+esc(I.years_old)+'</div>',
    '    <div class="cover-topic">'+esc(d.request.topic)+'</div>',
    '    <div class="cover-title">'+esc(d.title)+'</div>',
    '    <div class="cover-rule-ornament"><span>◆</span></div>',
    '    <div class="cover-desc">'+esc(d.description)+'</div>',
    '    <div class="cover-meta">',
    '      '+mi(I.country, d.request.country),
    '      '+mi(I.method, d.request.method),
    '      '+mi(I.chapters_label, String(d.chapters ? d.chapters.length : d.request.chapters)),
    '      '+mi(I.language_label, d.request.language),
    '    </div>',
    '  </div>',
    '</div>'
  ].join('\n');
}
function mi(label, val) {
  return '<div class="cover-meta-item"><span>'+esc(label)+'</span><strong>'+esc(val)+'</strong></div>';
}

/* ════════════════════════════════════════════════════════════════════════
   TOC
════════════════════════════════════════════════════════════════════════ */
function buildTOC(d) {
  var grade = gradeLabel(d.request.age);
  var rows = d.toc.map(function(t, i) {
    return '<li class="toc-row"><span class="toc-num">0'+(i+1)+'</span><div class="toc-info"><div class="toc-ch-name">'+esc(t.title)+'</div><div class="toc-ch-sum">'+esc(t.summary)+'</div></div><span class="toc-dots"></span><span class="toc-pnum">'+(i+2)+'</span></li>';
  }).join('');

  return [
    '<div class="book-page">',
    '  <div class="running-hdr">',
    '    <span class="rh-subject">'+esc(d.request.topic)+'</span>',
    '    <div class="rh-page-marker"></div>',
    '  </div>',
    '  <div class="page-body content">',
    '    <div class="toc-eyebrow">'+esc(I.index)+'</div>',
    '    <div class="toc-heading">'+esc(I.book_contents)+'</div>',
    '    <hr class="toc-divider">',
    '    <ul class="toc-list">'+rows+'</ul>',
    '  </div>',
    '  <div class="running-ftr">',
    '    <span class="rf-aprendizaje"></span>',
    '    <span class="page-num">i</span>',
    '    <div class="rf-marker"></div>',
    '  </div>',
    '</div>'
  ].join('\n');
}

/* ════════════════════════════════════════════════════════════════════════
   CHAPTER
════════════════════════════════════════════════════════════════════════ */
function buildChapter(d, ch, idx) {
  var pNum = idx + 2;
  var aprendizaje = ch.aprendizaje || '';
  var blocks = ch.blocks.map(renderBlock).join('');

  return [
    '<div class="book-page">',
    '  <div class="running-hdr">',
    '    <span class="rh-subject">'+esc(d.request.topic)+'</span>',
    '    <div class="rh-page-marker"></div>',
    '  </div>',
    '  <div class="page-body content">',
    '    <div class="ch-block">',
    '      <div class="ch-eyebrow">'+esc(I.chapter)+' '+(idx+1)+'</div>',
    '      <h2 class="ch-title">'+esc(ch.title)+'</h2>',
    '    </div>',
    '    '+blocks,
    '  </div>',
    '  <div class="running-ftr">',
    '    <span class="rf-aprendizaje">'+(aprendizaje ? '<strong>'+esc(I.aprendizaje)+':</strong> '+esc(aprendizaje) : '')+'</span>',
    '    <span class="page-num">'+pNum+'</span>',
    '    <div class="rf-marker"></div>',
    '  </div>',
    '</div>'
  ].join('\n');
}

/* ════════════════════════════════════════════════════════════════════════
   RENDER
════════════════════════════════════════════════════════════════════════ */
function render(d) {
  var html = buildCover(d);
  html += buildTOC(d);
  d.chapters.forEach(function(ch, i) { html += buildChapter(d, ch, i); });
  document.getElementById('app').innerHTML = html;
}

render(BOOK);
</script>
</body>
</html>
